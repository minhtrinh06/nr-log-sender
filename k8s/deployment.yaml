apiVersion: apps/v1
kind: Deployment
metadata:
  name: nr-log-sender
  labels:
    app: nr-log-sender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nr-log-sender
  template:
    metadata:
      labels:
        app: nr-log-sender
    spec:
      containers:
        - name: sender
          image: curlimages/curl:8.11.1
          # busybox sh runs the script (no bash in this image); shebang is ignored.
          command: ["sh", "/scripts/send-otlp-log.sh"]
          env:
            # Fleet-managed OTel collector (pipeline-control-gateway); its
            # logs/otlp pipeline forwards to https://otlp.nr-data.net with the
            # license key, so none is mounted here.
            - name: OTLP_ENDPOINT
              value: "http://pipeline-control-gateway.newrelic.svc.cluster.local:4318/v1/logs"
            - name: INTERVAL
              value: "5"
            - name: PAYLOAD_DIR
              value: "/payloads"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: payloads
              mountPath: /payloads
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
      volumes:
        - name: script
          configMap:
            name: nr-log-sender-script
            defaultMode: 0755
        # Built outside kustomize (kubectl --from-file=payloads/) so new files
        # need no manifest edit; kubelet syncs the mounted volume in-place.
        - name: payloads
          configMap:
            name: nr-log-sender-payloads
            optional: true
